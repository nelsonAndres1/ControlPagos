<div class="tree-page" [class.panel-collapsed]="!sidePanelOpen" [class.wide-graph]="wideGraph">
    <section class="tree-workspace">
        <div class="graph-toolbar">
            <div class="toolbar-group">
                <span class="toolbar-label">Vista</span>
                <button type="button" class="toolbar-button" [class.is-active]="!useCytoscape"
                    (click)="switchView(false)">
                    NGX Graph
                </button>
                <button type="button" class="toolbar-button" [class.is-active]="useCytoscape"
                    (click)="switchView(true)">
                    Cytoscape
                </button>
            </div>

            <div class="toolbar-group graph-stats">
                <span>{{ nodes_.length || 0 }} nodos</span>
                <span>{{ links_.length || 0 }} enlaces</span>
            </div>

            <div class="toolbar-group focus-status" *ngIf="activeNodeLabel">
                <span>{{ activeNodeLabel }}</span>
                <small>{{ activeNodeResume }}</small>
                <button type="button" class="toolbar-button compact-button" title="Limpiar foco"
                    (click)="clearFocus()">
                    Limpiar
                </button>
            </div>

            <div class="toolbar-spacer"></div>

            <div class="toolbar-group" *ngIf="useCytoscape">
                <button type="button" class="toolbar-button" [class.is-active]="readingMode"
                    title="Resaltar la zona cercana del nodo seleccionado" (click)="toggleReadingMode()">
                    Ruta
                </button>
                <button type="button" class="toolbar-button" [class.is-active]="layoutDirection === 'LR'"
                    title="Orientacion horizontal" (click)="setLayoutDirection('LR')">
                    Horizontal
                </button>
                <button type="button" class="toolbar-button" [class.is-active]="layoutDirection === 'TB'"
                    title="Orientacion vertical" (click)="setLayoutDirection('TB')">
                    Vertical
                </button>
                <button type="button" class="toolbar-button" title="Ver mapa completo" (click)="overviewGraph()">
                    Todo
                </button>
                <button type="button" class="toolbar-button" title="Centrar con lectura" (click)="fitGraph()">
                    Centrar
                </button>
                <button type="button" class="toolbar-button icon-button" title="Acercar" (click)="zoomGraph(1.18)">
                    +
                </button>
                <button type="button" class="toolbar-button icon-button" title="Alejar" (click)="zoomGraph(0.84)">
                    -
                </button>
                <button type="button" class="toolbar-button" title="Enfocar seleccion" (click)="focusSelected()">
                    Foco
                </button>
            </div>

            <div class="toolbar-group">
                <button type="button" class="toolbar-button" [class.is-active]="wideGraph" (click)="toggleWideGraph()">
                    {{ wideGraph ? 'Normal' : 'Amplio' }}
                </button>
                <button type="button" class="toolbar-button panel-button" (click)="toggleSidePanel()">
                    {{ sidePanelOpen ? 'Ocultar panel' : 'Mostrar panel' }}
                </button>
            </div>
        </div>

        <div class="graph-frame">
            <div *ngIf="useCytoscape" #cyContainer class="cyto-container"></div>

            <div *ngIf="useCytoscape" class="graph-legend">
                <span><i class="legend-dot start"></i>Inicio</span>
                <span><i class="legend-dot end"></i>Final</span>
                <span><i class="legend-line file"></i>Archivo</span>
                <span><i class="legend-line obs"></i>Obs.</span>
            </div>

            <ngx-graph *ngIf="!useCytoscape" class="chart-container graph-canvas" [view]="[1400, 850]"
                [links]="links_" [nodes]="nodes_" [curve]="curve" [layout]="layout" [nodeWidth]="250"
                [nodeHeight]="100" [layoutSettings]="layoutSettings" [enableZoom]="true" [autoZoom]="true"
                [clusters]="clusters_fin" layout="dagreCluster">

                <ng-template #defsTemplate>
                    <svg:defs>
                        <svg:filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </svg:filter>

                        <svg:marker id="dot-start" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"
                            markerUnits="strokeWidth">
                            <circle cx="4" cy="4" r="2.2" fill="context-stroke"></circle>
                        </svg:marker>

                        <svg:marker id="arrow-common" viewBox="0 -5 10 10" markerWidth="10" markerHeight="10"
                            refX="8" refY="0" orient="auto" markerUnits="strokeWidth">
                            <svg:path d="M0,-5L10,0L0,5" fill="context-stroke"></svg:path>
                        </svg:marker>

                        <ng-container *ngFor="let l of links_">
                            <svg:linearGradient [attr.id]="'grad-'+l.id" x1="0%" y1="0%" x2="100%" y2="0%">
                                <svg:stop offset="0%" [attr.stop-color]="getNodeColor(l.source)" />
                                <svg:stop offset="100%" [attr.stop-color]="getNodeColor(l.target)" />
                            </svg:linearGradient>
                        </ng-container>
                    </svg:defs>
                </ng-template>

                <ng-template #clusterTemplate let-cluster>
                    <svg:g class="node cluster">
                        <svg:rect rx="5" ry="5" [attr.width]="cluster.dimension.width"
                            [attr.height]="cluster.dimension.height" [attr.fill]="cluster.data?.color || '#e2e8f0'" />
                    </svg:g>
                </ng-template>

                <ng-template #nodeTemplate let-node>
                    <svg:g class="node">
                        <svg:rect [attr.width]="node.dimension.width" [attr.height]="node.dimension.height"
                            [attr.fill]="node.data?.color || '#e2e8f0'" rx="10" ry="10" />
                        <svg:text alignment-baseline="central" [attr.x]="10" [attr.y]="node.dimension.height / 5">
                            {{node.label}}
                        </svg:text>

                        <svg:foreignObject [attr.x]="node.dimension.width - 40" [attr.y]="node.dimension.height / 2"
                            [attr.width]="40" [attr.height]="20">
                            <xhtml:div xmlns="http://www.w3.org/1999/xhtml"
                                style="display:flex;justify-content:center;align-items:center;height:100%;">
                                <button class="btn btn-primary btn-sm" (click)="eliminar_nodo(node)">Eliminar</button>
                            </xhtml:div>
                        </svg:foreignObject>
                    </svg:g>
                </ng-template>

                <ng-template #linkTemplate let-link>
                    <svg:g class="edge">
                        <svg:path class="line-casing" [attr.id]="'casing-' + link.id" stroke="#fff"
                            [attr.stroke-width]="(link.archivo === 'SI') ? 7 : 5" stroke-linecap="round">
                        </svg:path>

                        <svg:path class="line" [attr.id]="link.id" [attr.stroke]="'url(#grad-'+link.id+')'"
                            [attr.stroke-width]="(link.archivo === 'SI') ? 4 : 2.5"
                            [attr.marker-end]="'url(#arrow-common)'" [attr.marker-start]="'url(#dot-start)'"
                            [attr.stroke-dasharray]="(link.observacion === 'SI') ? '6,4' : null"
                            stroke-linecap="round">
                        </svg:path>

                        <svg:path class="hit-area" [attr.id]="'hit-' + link.id" stroke="transparent"
                            stroke-width="14">
                        </svg:path>

                        <svg:text class="edge-label" text-anchor="middle">
                            <textPath class="text-path" [attr.href]="'#' + link.id"
                                [style.dominant-baseline]="link.dominantBaseline" startOffset="50%">
                                {{link.label}}
                            </textPath>
                        </svg:text>
                    </svg:g>
                </ng-template>
            </ngx-graph>
        </div>
    </section>

    <aside class="tree-side-panel" *ngIf="sidePanelOpen">
        <div class="panel-card">
            <div class="panel-card-header">
                <h6>Arboles existentes</h6>
            </div>
            <div class="panel-card-body">
                <div class="panel-form">
                    <label for="selArbol">Arboles</label>
                    <select class="form-control" id="selArbol" (change)="select_iniciar_edicion($event)">
                        <option value="" selected>Seleccione!</option>
                        <option *ngFor="let dt of arboles_existentes" [value]="dt.proceso">{{dt.proceso}}</option>
                    </select>
                    <button type="button" class="btn btn-primary" (click)="iniciar_edicion()">Editar</button>
                </div>
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-card-header">
                <h6>Procesos</h6>
            </div>
            <div class="panel-card-body">
                <div class="panel-form">
                    <label for="selProceso">Proceso</label>
                    <select class="form-control" id="selProceso" (change)="ingrese($event)">
                        <option value="" selected>Seleccione!</option>
                        <option *ngFor="let dt of data_teso20" [value]="dt.id">{{dt.proceso}}</option>
                    </select>
                    <button type="button" class="btn btn-primary" (click)="enviar()">Agregar</button>
                </div>
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-card-header">
                <h6>Enlaces</h6>
            </div>
            <div class="panel-card-body">
                <div class="panel-form">
                    <label for="enlace1">Enlace 1</label>
                    <select class="form-control" id="enlace1" (change)="enlace1($event)">
                        <option value="" selected>Seleccione!</option>
                        <option *ngFor="let dt of nodes_" [value]="dt.id">{{dt.label}}</option>
                    </select>

                    <label for="enlace2">Enlace 2</label>
                    <select class="form-control" id="enlace2" (change)="enlace2($event)">
                        <option value="" selected>Seleccione!</option>
                        <option *ngFor="let dt of nodes_" [value]="dt.id">{{dt.label}}</option>
                    </select>

                    <label for="obs">Observacion</label>
                    <input id="obs" class="form-control" type="text" placeholder="Observacion..."
                        (input)="input_obs($event)">

                    <div class="two-columns">
                        <div>
                            <label for="selObs">Observacion?</label>
                            <select class="form-control" id="selObs" (change)="observacion($event)">
                                <option value="NO" selected>NO</option>
                                <option value="SI">SI</option>
                            </select>
                        </div>
                        <div>
                            <label for="selArc">Archivo?</label>
                            <select class="form-control" id="selArc" (change)="archivo($event)">
                                <option value="NO" selected>NO</option>
                                <option value="SI">SI</option>
                            </select>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary" (click)="enviar_enlaces()">Agregar</button>
                    <button type="button" class="btn btn-danger btn-sm" [disabled]="!useCytoscape"
                        (click)="deleteSelected()">
                        Eliminar seleccion
                    </button>
                </div>
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-card-header">
                <h6>Guardar</h6>
            </div>
            <div class="panel-card-body">
                <div class="panel-form">
                    <label for="nombreProceso">Nombre Proceso</label>
                    <input id="nombreProceso" type="text" class="form-control" placeholder="Nombre Proceso"
                        [value]="nombre_proceso" (input)="addProceso($event)">
                    <button type="button" class="btn btn-warning" (click)="guardar()">Guardar</button>
                </div>
            </div>
        </div>
    </aside>
</div>
