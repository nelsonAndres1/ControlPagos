<div *ngIf="uploading">
  <app-loading message="Espere, estamos subiendo archivos y registrando el pago..."></app-loading>
</div>

<div class="div1">
  <h2>Soportes Solicitados</h2>
  <div class="table-responsive">
  <table class="table table-hover upload-table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Documento Solicitado</th>
        <th scope="col">Subir Documento</th>
        <th scope="col">¿Obligatorio?</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let dt of datoSoportes">
        <th scope="row">{{dt.codsop}}</th>
        <td>{{dt.detsop}}</td>
        <td>
          <div class="upload-actions">
            <input #fileInput class="form-control" type="file" [id]="'formFile_' + dt.codsop"
              (change)="onFileSelected($event, dt.detsop, dt, fileInput)">

            <button *ngIf="previewFiles[dt.detsop]" type="button" class="btn btn-primary btn-sm"
              (click)="abrirPreview(dt.detsop)">
              Visualizar
            </button>
          </div>
        </td>
        <td>
          {{obligatorio(dt.per)}}
        </td>
      </tr>
    </tbody>
  </table>
  </div>
  <div class="upload-submit">
    <button *ngIf="hasSelectedFiles()" (click)="uploadFiles()" type="submit" class="btn btn-success"
      [disabled]="uploading">
      <span *ngIf="!uploading">Subir Documentos y Enviar Pago</span>
      <span *ngIf="uploading">
        <i class="fa fa-spinner fa-spin"></i> Subiendo, por favor espera...
      </span>
    </button>

  </div>
  <div *ngIf="errorMessage">{{ errorMessage }}</div>
</div>
<div class="preview-modal-backdrop" *ngIf="modalPreviewUrl">
  <div class="preview-modal">
    <div class="preview-modal-header">
      <h5>{{ modalPreviewName }}</h5>
      <button type="button" class="btn btn-danger btn-sm" (click)="cerrarPreview()">X</button>
    </div>

    <div class="preview-modal-body">
      <!-- Imagen -->
      <img *ngIf="modalPreviewType?.startsWith('image/')" [src]="modalPreviewUrl" alt="Vista previa"
        class="preview-img">

      <!-- PDF -->
      <iframe *ngIf="modalPreviewType === 'application/pdf'" [src]="modalPreviewUrl" class="preview-frame">
      </iframe>

      <!-- Otros -->
      <div *ngIf="modalPreviewType !== 'application/pdf' && !modalPreviewType?.startsWith('image/')">
        No se puede previsualizar este tipo de archivo en el modal.
      </div>
    </div>
  </div>
</div>
